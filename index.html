<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ═══ Primary SEO Meta Tags ═══ -->
  <title>RecipeWallah | AI-Powered Health, Fitness Tracking & Nutrition Platform</title>
  <meta name="title" content="RecipeWallah | AI-Powered Health, Fitness Tracking & Nutrition Platform" />
  <meta name="description"
    content="RecipeWallah is a comprehensive AI health platform. Features include AI-generated recipes, real-time fitness form tracking, a medical database, and BMI analysis. 100% free, no login." />
  <meta name="keywords"
    content="AI recipe app, fitness tracking AI, vision-based pose detection, real-time exercise tracking, macro tracker, medical database, body analysis BMI, nutrition app india, RecipeWallah, RW, wallah, wala, bilingual health app, voice health search" />
  <meta name="author" content="RecipeWallah" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="English" />
  <meta name="revisit-after" content="7 days" />
  <link rel="canonical" href="https://www.recipewallah.in/" />

  <!-- ═══ Performance Hints ═══ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="dns-prefetch" href="https://www.recipewallah.in" />

  <!-- ═══ Open Graph / Social Sharing ═══ -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.recipewallah.in/" />
  <meta property="og:title" content="RecipeWallah | Free AI Recipe App, Fitness Nutrition & Macro Tracker" />
  <meta property="og:description"
    content="RecipeWallah is a 100% free AI-powered recipe app. Get personalized bulking & cutting recipes, track macros, and get medicine interaction alerts. No login required." />
  <meta property="og:image"
    content="/logo512.png" />
  <meta property="og:site_name" content="RecipeWallah" />
  <meta property="og:locale" content="en_IN" />

  <!-- ═══ Twitter Card ═══ -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://www.recipewallah.in/" />
  <meta name="twitter:title" content="RecipeWallah | Free AI Recipe App, Fitness Nutrition & Macro Tracker" />
  <meta name="twitter:description"
    content="AI-curated recipes, macro tracking, bulking & cutting plans and medicine alerts. 100% free & no login needed." />
  <meta name="twitter:image"
    content="/logo512.png" />

  <!-- ═══ JSON-LD: SoftwareApplication ═══ -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "RecipeWallah",
      "operatingSystem": "Android",
      "applicationCategory": "HealthAndFitnessApplication",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "INR" },
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.8", "ratingCount": "120" },
      "description": "RecipeWallah is a comprehensive AI-powered health and lifestyle platform including intelligent recipe generation, real-time fitness pose detection via advanced vision AI, medical databases, and body analysis.",
      "url": "https://www.recipewallah.in/",
      "screenshot": "/logo512.png",
      "featureList": "AI Recipe Search, Vision-Based Fitness Tracking, Macro Tracker, Medical Database, BMI & Body Analysis, Smart Reminders, Voice Search, Bilingual Support"
    }
    </script>

  <!-- ═══ JSON-LD: Organization ═══ -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RecipeWallah",
      "url": "https://www.recipewallah.in/",
      "logo": "https://www.recipewallah.in/favicon.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "petrolearns@gmail.com",
        "contactType": "customer support"
      }
    }
    </script>

  <!-- ═══ JSON-LD: WebSite with SearchAction ═══ -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RecipeWallah",
      "url": "https://www.recipewallah.in/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.recipewallah.in/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  <!-- ═══ JSON-LD: FAQPage ═══ -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is RecipeWallah free to use?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes! RecipeWallah is 100% free to download and use with no hidden subscriptions or paywalls." }
        },
        {
          "@type": "Question",
          "name": "Does RecipeWallah work without creating an account?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes, RecipeWallah works completely without any account, login, or registration. Your data stays on your device." }
        },
        {
          "@type": "Question",
          "name": "Can RecipeWallah help with bulking and cutting diets?",
          "acceptedAnswer": { "@type": "Answer", "text": "Absolutely! RecipeWallah provides AI-powered high-protein meal plans specifically tailored for gym goals like bulking, cutting, and maintaining weight." }
        },
        {
          "@type": "Question",
          "name": "Is my health data safe in RecipeWallah?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. All health profile data you enter is stored only on your device using local storage. We never upload or store your personal or health data on our servers." }
        },
        {
          "@type": "Question",
          "name": "How do I install the Android APK?",
          "acceptedAnswer": { "@type": "Answer", "text": "Download the APK file from our website, open it on your Android device, and tap Allow from this source if prompted by your security settings." }
        },
        {
          "@type": "Question",
          "name": "What AI does RecipeWallah use?",
          "acceptedAnswer": { "@type": "Answer", "text": "RecipeWallah uses Google Gemini and OpenAI to generate personalized recipes, nutrition plans, macro calculations, and medicine awareness alerts." }
        }
      ]
    }
    </script>
</head>

  <div id="root"></div>

</body>

</html>
